# Repo-root config: app is in teyia-web/, docker-compose.yml uses Dockerfile.teyia
# https://docs.elest.io/books/cicd-pipelines/page/create-your-own-template-elestioyml

config:
  runTime: 'dockerCompose'
  version: ''
  framework: ''
  installCommand: ''
  buildCommand: 'docker-compose -f docker-compose.teyia.yml build'
  buildDir: '/'
  runCommand: 'docker-compose -f docker-compose.teyia.yml up -d'
ports:
  - protocol: 'HTTPS'
    targetProtocol: 'HTTP'
    listeningPort: '443'
    targetPort: '3000'
    targetIP: '172.17.0.1'
    public: true
    path: '/'
    isAuth: false
webUI:
  - url: 'https://[CI_CD_DOMAIN]'
    label: 'Website'
